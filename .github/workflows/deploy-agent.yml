name: Build & Deploy Agent

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: crmlricohg4usswaoj3rfi
  CONTAINER_APP: agent-ricoh
  RESOURCE_GROUP: rg-ricoh-ai-poc
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r app/requirements.txt pytest
      - name: Unit tests
        run: pytest tests/ -v

  build-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build image in ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --resource-group $RESOURCE_GROUP \
            --image ricoh-agent:${{ github.sha }} \
            --file app/Dockerfile \
            app/
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/ricoh-agent:${{ github.sha }}
