name: Build & Deploy Agent

on:
  push:
    branches: [main]
    paths: ['app/**']
  workflow_dispatch:

env:
  ACR_NAME: caf3491e5787acr
  CONTAINER_APP: agent-ricoh
  RESOURCE_GROUP: rg-ricoh-ai-poc

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r app/requirements.txt pytest
      - name: Unit tests
        run: pytest tests/ -v
        continue-on-error: true

  build-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build image
        run: az acr build --registry $ACR_NAME --resource-group $RESOURCE_GROUP --image ricoh-agent:${{ github.sha }} --file app/Dockerfile app/
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/ricoh-agent:${{ github.sha }}
